<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <!-- Header -->
        <header class="text-center mb-5 bg-white p-4 rounded shadow-sm border">
            <h1 class="display-5 fw-bold text-dark">Star Wars Character</h1>
            <p class="lead mb-0 text-secondary">Discover Characters</p>
        </header>

        <!-- Loader -->
        <div id="loader" class="text-center my-5 d-none">
            <div class="spinner-border text-secondary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 fs-5 text-secondary">Fetching...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="alert alert-danger text-center bg-white border-danger text-danger border-2 fw-semibold d-none mx-auto" style="max-width: 500px;" role="alert">
            Unable to load characters. Please try again later.
        </div>

        <!-- Character Grid -->
        <div id="character-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4 mb-5 justify-content-center">
            <!-- Cards will be dynamically inserted here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 mt-auto">
        <p class="mb-0 text-secondary">Simple Application</p>
    </footer>

    <!-- Character Details Modal -->
    <div class="modal fade" id="characterModal" tabindex="-1" aria-labelledby="characterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white shadow border-0">
                <div class="modal-header border-bottom">
                    <h5 class="modal-title fs-3 fw-bold text-dark" id="characterModalLabel">Name</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Loader -->
                    <div id="modal-loader" class="text-center my-4">
                        <div class="spinner-border text-secondary" role="status"></div>
                        <p class="mt-2 text-secondary">Loading details...</p>
                    </div>
                    
                    <!-- Content -->
                    <div id="modal-content" class="d-none">
                        <h6 class="text-secondary text-uppercase mb-3 border-bottom pb-2">Information</h6>
                        <div class="row g-3 mb-4 text-dark">
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Height</p>
                                <p id="modal-height" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Mass</p>
                                <p id="modal-mass" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Birth Year</p>
                                <p id="modal-birth" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Date Added</p>
                                <p id="modal-added" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                        </div>

                        <h6 class="text-secondary text-uppercase mb-3 border-bottom pb-2">Location</h6>
                        <div class="row g-3 text-dark">
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Planet</p>
                                <p id="modal-planet" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Population</p>
                                <p id="modal-population" class="fw-medium fs-5 mb-0">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Terrain</p>
                                <p id="modal-terrain" class="fw-medium fs-5 mb-0 text-capitalize">-</p>
                            </div>
                            <div class="col-6">
                                <p class="mb-0 text-muted small text-uppercase">Climate</p>
                                <p id="modal-climate" class="fw-medium fs-5 mb-0 text-capitalize">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
